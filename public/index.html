<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>파스텔 게시판</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { height: auto; min-height: 100vh; padding: 2rem; align-items: flex-start; }
        .board-container { width: 80%; max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .user-info { font-size: 0.9rem; }
        .logout-btn { width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; background-color: #eee; }
    </style>
</head>
<body>
    <div class="board-container">
        <div class="header">
            <h1>파스텔 게시판</h1>
            <div id="authSection" class="user-info"></div>
        </div>
        <div id="content">
            <button class="btn-small" onclick="location.href='write.html'">새 글 쓰기</button>
            <table>
                <thead>
                    <tr>
                        <th>제목</th>
                        <th>작성자</th>
                        <th>추천</th>
                        <th>날짜</th>
                    </tr>
                </thead>
                <tbody id="postList"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const postList = document.getElementById('postList');
            postList.innerHTML = posts.map(post => `
                <tr>
                    <td><a href="view.html?id=${post.id}" class="post-link">${post.title}</a></td>
                    <td>${post.username}</td>
                    <td>${post.likes_count}</td>
                    <td>${new Date(post.created_at).toLocaleDateString()}</td>
                </tr>
            `).join('');
        }

        async function checkAuth() {
            const res = await fetch('/api/me');
            const data = await res.json();
            const authSection = document.getElementById('authSection');
            if (data.user) {
                authSection.innerHTML = `
                    <span>${data.user.username}님</span>
                    <button class="logout-btn" onclick="logout()">로그아웃</button>
                `;
                loadPosts();
            } else {
                location.href = 'login.html';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            location.href = 'login.html';
        }

        checkAuth();
    </script>
</body>
</html>
