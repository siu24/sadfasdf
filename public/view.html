<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 보기 - 파스텔 게시판</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { height: auto; min-height: 100vh; padding: 2rem; align-items: flex-start; }
        .post-container { width: 80%; max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="post-container">
        <h1 id="postTitle">제목</h1>
        <div class="post-meta">
            작성자: <span id="postAuthor"></span> | 
            작성일: <span id="postDate"></span> | 
            추천수: <span id="postLikes">0</span>
        </div>
        <div id="postContent" class="post-content">내용</div>
        
        <button class="like-btn" id="likeBtn">
            🌸 추천 <span id="likeCount">0</span>
        </button>

        <div class="comment-section">
            <h3>댓글</h3>
            <div id="commentList"></div>
            
            <form id="commentForm" class="comment-form">
                <textarea id="commentInput" placeholder="댓글을 입력하세요..." style="height: 80px;" required></textarea>
                <button type="submit" class="btn-small">댓글 등록</button>
            </form>
        </div>
        
        <div class="action-buttons">
            <button class="btn-small btn-secondary" onclick="location.href='index.html'">목록으로</button>
            <div id="authorButtons" style="display:none; gap: 10px;">
                <button id="editBtn" class="btn-small">수정</button>
                <button id="deleteBtn" class="btn-small btn-secondary">삭제</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function loadPost() {
            const [postRes, meRes] = await Promise.all([
                fetch(`/api/posts/${postId}`),
                fetch('/api/me')
            ]);
            
            const post = await postRes.json();
            const meData = await meRes.json();

            document.getElementById('postTitle').innerText = post.title;
            document.getElementById('postAuthor').innerText = post.username;
            document.getElementById('postDate').innerText = new Date(post.created_at).toLocaleString();
            document.getElementById('postLikes').innerText = post.likes_count;
            document.getElementById('likeCount').innerText = post.likes_count;
            document.getElementById('postContent').innerText = post.content;

            if (meData.user && meData.user.id === post.user_id) {
                document.getElementById('authorButtons').style.display = 'flex';
                document.getElementById('editBtn').onclick = () => location.href = `write.html?id=${postId}`;
                document.getElementById('deleteBtn').onclick = async () => {
                    if (confirm('정말 삭제하시겠습니까?')) {
                        const res = await fetch(`/api/posts/${postId}`, { method: 'DELETE' });
                        if (res.ok) {
                            alert('삭제되었습니다.');
                            location.href = 'index.html';
                        }
                    }
                };
            }

            loadComments();
        }

        async function loadComments() {
            const res = await fetch(`/api/posts/${postId}/comments`);
            const comments = await res.json();
            const commentList = document.getElementById('commentList');
            commentList.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <span class="comment-author">${c.username}</span>
                    <span class="comment-date">${new Date(c.created_at).toLocaleString()}</span>
                    <div class="comment-content">${c.content}</div>
                </div>
            `).join('') || '<p style="color:#aaa;">첫 댓글을 남겨보세요!</p>';
        }

        document.getElementById('likeBtn').onclick = async () => {
            const res = await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                document.getElementById('postLikes').innerText = data.count;
                document.getElementById('likeCount').innerText = data.count;
            } else {
                alert(data.error);
            }
        };

        document.getElementById('commentForm').onsubmit = async (e) => {
            e.preventDefault();
            const content = document.getElementById('commentInput').value;
            const res = await fetch(`/api/posts/${postId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            if (res.ok) {
                document.getElementById('commentInput').value = '';
                loadComments();
            }
        };

        loadPost();
    </script>
</body>
</html>
