<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 진행 상황</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .progress-container { width: 100%; background-color: #f3f3f3; border-radius: 5px; margin-bottom: 20px; }
        .progress-bar { width: 0%; height: 30px; background-color: #4caf50; text-align: center; line-height: 30px; color: white; border-radius: 5px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ddd; }
        li.completed { text-decoration: line-through; color: gray; }
        li.current { font-weight: bold; color: #2196f3; }
    </style>
</head>
<body>
    <h1>프로젝트 진행 상황</h1>
    <div class="progress-container">
        <div class="progress-bar" id="progressBar" style="width: 60%;">60%</div>
    </div>
    <ul>
        <li class="completed">1. 환경 설정 및 DB 스키마 생성</li>
        <li class="completed">2. 회원가입, 로그인 및 자동로그인 구현</li>
        <li class="completed">3. 게시글 CRUD (목록, 작성, 수정, 삭제)</li>
        <li class="current">4. 댓글 및 추천 기능 구현</li>
        <li>5. 최종 UI 통합 및 마감</li>
    </ul>
</body>
</html>
